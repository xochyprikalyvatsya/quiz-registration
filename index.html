<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="Content-Security-Policy" content="frame-ancestors *">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Регистрация на квиз | Эйнштейн Party</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; width: 100%; max-width: 100vw; overflow-x: hidden; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: linear-gradient(135deg, #AF2C83, #E50B7C, #E63349, #E95233, #F2922E, #F9B224); min-height: 100vh; display: flex; flex-direction: column; width: 100%; max-width: 100vw; overflow-x: hidden; }
        .hero { width: 100%; min-height: 500px; display: flex; flex-direction: column; justify-content: flex-end; background: url('https://s10.iimage.su/s/12/gEwIklnxc3TJwqhG0UrBwtAvdwGoTwSQbKQG3eKsq.png') center/cover no-repeat; position: relative; }
        .hero::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.4) 80%, rgba(175,44,131,0.9) 100%); }
        .hero-spacer { height: 80px; position: relative; z-index: 2; }
        .form-wrapper { background: rgba(0,0,0,0.2); padding: 0 20px 60px; flex: 1; width: 100%; max-width: 100vw; margin-top: -80px; position: relative; z-index: 3; }
        .form-switcher { max-width: 1000px; margin: 0 auto; width: 100%; }
        .form-container, .thank-you { background: rgba(255,255,255,0.96); border-radius: 40px; padding: 40px 35px; box-shadow: 0 25px 45px rgba(0,0,0,0.3); width: 100%; }
        .thank-you { display: none; text-align: center; }
        .form-container.hidden { display: none; }
        .thank-you.show { display: block; }
        .thank-you h2 { font-size: 28px; margin-bottom: 15px; color: #22212F; }
        .thank-you p { font-size: 18px; margin-bottom: 25px; }
        .thank-you button { background: linear-gradient(135deg, #AF2C83, #E50B7C, #F9B224); color: white; border: none; padding: 12px 28px; border-radius: 40px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .section-title { font-size: 24px; font-weight: 700; margin: 45px 0 20px; padding-bottom: 8px; border-bottom: 3px solid #AF2C83; color: #22212F; }
        .section-title:first-of-type { margin-top: 0; }
        .games-grid { display: flex; flex-direction: column; gap: 16px; margin-bottom: 15px; }
        .game-card-wrapper { background: #e0e0e0; border-radius: 20px; padding: 2px; cursor: pointer; }
        .game-card-wrapper.selected { background: linear-gradient(135deg, #AF2C83, #E50B7C, #F9B224); }
        .game-card { background: white; border-radius: 18px; padding: 16px; }
        .game-info { margin-bottom: 12px; }
        .game-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; color: #1a1a2e; }
        .game-date { font-size: 13px; color: #666; }
        .game-image { width: 100%; border-radius: 12px; display: block; object-fit: contain; }
        .players-grid, .yesno-grid { display: flex; flex-wrap: wrap; gap: 12px; margin: 15px 0 10px; }
        .player-btn, .yesno-btn { background: #f0f2f5; border: 1px solid #ccc; padding: 10px 18px; border-radius: 40px; font-size: 16px; cursor: pointer; }
        .player-btn.selected, .yesno-btn.selected { background: linear-gradient(135deg, #AF2C83, #E50B7C, #F9B224); color: white; border: none; }
        .question-title { font-weight: 700; margin: 20px 0 8px; font-size: 18px; }
        .input-group { margin-bottom: 25px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; }
        input[type="text"], input[type="tel"], input[type="email"] { width: 100%; padding: 12px; border-radius: 16px; border: 1px solid #ccc; font-size: 16px; }
        button[type="submit"] { width: 100%; padding: 16px; background: linear-gradient(135deg, #AF2C83, #E50B7C, #F9B224); color: white; border: none; border-radius: 40px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; }
        .checkbox-group { display: flex; gap: 10px; margin: 20px 0; align-items: center; }
        .status { margin-top: 15px; text-align: center; font-size: 14px; display: none; }
        .status.error { color: red; display: block; }
        @media (max-width: 768px) { .hero { min-height: 300px; } .hero-spacer { height: 50px; } .form-wrapper { margin-top: -50px; padding: 0 10px 40px; } .form-container, .thank-you { padding: 25px 14px; border-radius: 28px; } .game-title { font-size: 16px; } .game-date { font-size: 12px; } .section-title { font-size: 20px; margin: 30px 0 15px; } .player-btn, .yesno-btn { padding: 8px 14px; font-size: 14px; } button[type="submit"] { font-size: 16px; padding: 14px; } }
    </style>
</head>
<body>
<div class="hero"><div class="hero-spacer"></div></div>
<div class="form-wrapper">
    <div class="form-switcher">
        <div class="form-container" id="formContainer">
            <form id="quizForm">
                <div class="section-title">📅 На какой квиз идём?</div>
                <div class="games-grid" id="gamesGrid"></div>
                <div class="section-title">👥 Команда</div>
                <div class="input-group"><label>Название команды *</label><input type="text" id="teamName" required placeholder="Например, Мозголомы"></div>
                <div class="question-title">Сколько вас?</div>
                <div class="players-grid" id="playersGrid"></div>
                <div id="dynamicQuestions"></div>
                <div class="section-title">📋 Контакты</div>
                <div class="input-group"><label>Контактный телефон</label><input type="tel" id="phone" placeholder="+7 999 123-45-67"></div>
                <div class="input-group"><label>Электронная почта *</label><input type="email" id="email" required placeholder="example@mail.ru"></div>
                <div class="checkbox-group"><input type="checkbox" id="consent" required><label>Я согласен(на) на обработку персональных данных *</label></div>
                <button type="submit">ЗАРЕГИСТРИРОВАТЬСЯ 🚀</button>
                <div id="statusMessage" class="status"></div>
            </form>
        </div>
        <div class="thank-you" id="thankYou">
            <h2>🎉 Спасибо за регистрацию!</h2>
            <p>Мы свяжемся с вами в день игры.</p>
            <button onclick="window.location.href='https://vk.com/einsteinparty_nsk'">Вернуться в сообщество</button>
        </div>
    </div>
</div>
<script>
    if (window.vkBridge) {
        vkBridge.send('VKWebAppInit')
            .then(() => vkBridge.send('VKWebAppResizeWindow', { width: 'full', height: 'full' }))
            .catch(() => {});
    }

    function getVkUserId() {
        const p = new URLSearchParams(window.location.search);
        return p.get('vk_user_id') || '';
    }

    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwOZka_52KA9FbYJ4tPt02pRMz8eXKXot-41FbW4gkdSyb-eMtqdvDstO6k9y0sHVHgWA/exec';

    const games = [
        { title: '🧡 Классика. Обо всём', date: '📅 17 мая (ВС), 15:00 · Раковарня', image: 'https://s10.iimage.su/s/12/gkLBzazx9uim7sGfHRcd5mAkYyuHZOezNrhJekMCe.png' },
        { title: '🌇 Битва городов', date: '📅 21 мая (ЧТ), 19:30 · Раковарня', image: 'https://s10.iimage.su/s/12/guXJYLCxNvaN8aeuSEU4khXUzzocoQI6GVZmsU3qA.png' },
        { title: '⚽ Футбол: серия игр (2/4)', date: '📅 28 мая (ЧТ), 19:30 · Раковарня', image: 'https://s10.iimage.su/s/12/gJdwhgdxdeiQ1rIl0aUGuJ6Gtn1YXRn4NI35Duok4.png' },
        { title: '🎶 Музыкальное лото', date: '📅 31 мая (ВС), 16:00 · Типография', image: 'https://s10.iimage.su/s/12/gBHyjIxx29KNc7yFL3Hs918ozPipLWkseImAUcS48.png' }
    ];

    function buildGamesGrid() {
        const g = document.getElementById('gamesGrid');
        g.innerHTML = '';
        games.forEach(game => {
            const w = document.createElement('div');
            w.className = 'game-card-wrapper';
            const c = document.createElement('div');
            c.className = 'game-card';
            c.innerHTML = `<div class="game-info"><div class="game-title">${game.title}</div><div class="game-date">${game.date}</div></div><img class="game-image" src="${game.image}" alt="">`;
            w.appendChild(c);
            w.addEventListener('click', () => w.classList.toggle('selected'));
            g.appendChild(w);
        });
    }
    buildGamesGrid();

    let selectedPlayers = null, isLookingForTeam = false, acceptOthers = null, hasBirthday = null, hasFreePass = null, freePassCount = '';

    function buildPlayersGrid() {
        const g = document.getElementById('playersGrid');
        g.innerHTML = '';
        for (let i = 2; i <= 10; i++) {
            const b = document.createElement('div');
            b.className = 'player-btn';
            b.innerText = i;
            b.addEventListener('click', () => {
                document.querySelectorAll('.player-btn').forEach(x => x.classList.remove('selected'));
                b.classList.add('selected');
                selectedPlayers = i; isLookingForTeam = false;
                updateDynamicQuestions();
            });
            g.appendChild(b);
        }
        const lb = document.createElement('div');
        lb.className = 'player-btn';
        lb.innerText = '🤝 Ищу команду';
        lb.addEventListener('click', () => {
            document.querySelectorAll('.player-btn').forEach(x => x.classList.remove('selected'));
            lb.classList.add('selected');
            selectedPlayers = null; isLookingForTeam = true;
            updateDynamicQuestions();
        });
        g.appendChild(lb);
    }

    function updateDynamicQuestions() {
        const d = document.getElementById('dynamicQuestions');
        d.innerHTML = '';
        if (isLookingForTeam) acceptOthers = null;
        hasBirthday = null; hasFreePass = null; freePassCount = '';

        if (!isLookingForTeam && selectedPlayers) {
            const bl = document.createElement('div');
            bl.innerHTML = '<div class="question-title">🤝 Готовы принять людей к себе в команду?</div>';
            const bd = document.createElement('div'); bd.className = 'yesno-grid';
            const y = document.createElement('div'); y.className = 'yesno-btn'; y.innerText = 'Да';
            const n = document.createElement('div'); n.className = 'yesno-btn'; n.innerText = 'Нет';
            y.onclick = () => { acceptOthers = true; y.classList.add('selected'); n.classList.remove('selected'); };
            n.onclick = () => { acceptOthers = false; n.classList.add('selected'); y.classList.remove('selected'); };
            bd.appendChild(y); bd.appendChild(n); bl.appendChild(bd); d.appendChild(bl);
        }

        const bb = document.createElement('div');
        bb.innerHTML = '<div class="question-title">🎂 Есть именинник?</div>';
        const bd2 = document.createElement('div'); bd2.className = 'yesno-grid';
        const yb = document.createElement('div'); yb.className = 'yesno-btn'; yb.innerText = 'Да';
        const nb = document.createElement('div'); nb.className = 'yesno-btn'; nb.innerText = 'Нет';
        yb.onclick = () => { hasBirthday = true; yb.classList.add('selected'); nb.classList.remove('selected'); };
        nb.onclick = () => { hasBirthday = false; nb.classList.add('selected'); yb.classList.remove('selected'); };
        bd2.appendChild(yb); bd2.appendChild(nb); bb.appendChild(bd2); d.appendChild(bb);

        const fb = document.createElement('div');
        fb.innerHTML = '<div class="question-title">🎫 Есть ли у вас бесплатные проходки?</div>';
        const fd = document.createElement('div'); fd.className = 'yesno-grid';
        const yf = document.createElement('div'); yf.className = 'yesno-btn'; yf.innerText = 'Да';
        const nf = document.createElement('div'); nf.className = 'yesno-btn'; nf.innerText = 'Нет';
        const fi = document.createElement('input');
        fi.type = 'text'; fi.placeholder = 'Сколько проходок?'; fi.style.marginTop = '12px'; fi.style.width = '100%'; fi.style.display = 'none';
        fi.addEventListener('input', e => { freePassCount = e.target.value; });
        yf.onclick = () => { hasFreePass = true; yf.classList.add('selected'); nf.classList.remove('selected'); fi.style.display = 'block'; };
        nf.onclick = () => { hasFreePass = false; nf.classList.add('selected'); yf.classList.remove('selected'); fi.style.display = 'none'; freePassCount = ''; };
        fd.appendChild(yf); fd.appendChild(nf); fb.appendChild(fd); fb.appendChild(fi); d.appendChild(fb);
    }

    buildPlayersGrid();
    updateDynamicQuestions();

    document.getElementById('quizForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const sw = document.querySelectorAll('.game-card-wrapper.selected');
        if (sw.length === 0) { document.getElementById('statusMessage').textContent = '❌ Выберите игру'; document.getElementById('statusMessage').className = 'status error'; return; }
        const sg = Array.from(sw).map(w => w.querySelector('.game-title').innerText + ' (' + w.querySelector('.game-date').innerText + ')').join('; ');
        const tn = document.getElementById('teamName').value.trim();
        const em = document.getElementById('email').value.trim();
        const ph = document.getElementById('phone').value.trim();
        if (!tn || !em) { document.getElementById('statusMessage').textContent = '❌ Заполните команду и почту'; document.getElementById('statusMessage').className = 'status error'; return; }
        if (!document.getElementById('consent').checked) { document.getElementById('statusMessage').textContent = '❌ Нужно согласие'; document.getElementById('statusMessage').className = 'status error'; return; }

        const fId = getVkUserId();
        const fLink = fId ? `https://vk.com/id${fId}` : '';
        const fDialog = fId ? `https://vk.com/gim181502694?sel=${fId}` : '';

        const payload = {
            vkId: fId,
            vkLink: fLink,
            dialogLink: fDialog,
            teamName: tn,
            members: isLookingForTeam ? 'Ищу команду' : (selectedPlayers || ''),
            acceptOthers: acceptOthers === true ? 'Да' : (acceptOthers === false ? 'Нет' : ''),
            hasBirthday: hasBirthday === true ? 'Да' : (hasBirthday === false ? 'Нет' : ''),
            freePass: hasFreePass === true ? (freePassCount || 'Да') : (hasFreePass === false ? 'Нет' : ''),
            gamesList: sg,
            phone: ph,
            email: em
        };

        try {
            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            document.getElementById('formContainer').classList.add('hidden');
            document.getElementById('thankYou').classList.add('show');
        } catch (err) {
            document.getElementById('statusMessage').textContent = '⚠️ Ошибка';
            document.getElementById('statusMessage').className = 'status error';
        }
    });
</script>
</body>
</html>
